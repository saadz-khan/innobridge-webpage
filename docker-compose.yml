services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: innobridge-smartconveyance-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      HOST: 0.0.0.0
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      DEMO_REQUEST_LOG_PATH: ${DEMO_REQUEST_LOG_PATH:-/var/app/data/demo-requests.jsonl}
      RATE_LIMIT_MAX: 60
      RATE_LIMIT_WINDOW: 1 minute
    volumes:
      - demo-requests:/var/app/data
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - innobridge

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: innobridge-smartconveyance-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    networks:
      - innobridge

volumes:
  demo-requests:

networks:
  innobridge:
