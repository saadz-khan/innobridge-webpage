name: SmartSuite

services:
  SmartSuiteDatabase:
    image: mysql:8.4
    container_name: SmartSuiteDatabase
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-smartsuite}
      MYSQL_USER: ${MYSQL_USER:-smartsuite}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-smartsuite_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-smartsuite_root_password}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      SmartSuiteNetwork:
        aliases:
          - smartsuite-database

  SmartSuiteBackend:
    image: smartsuite/backend:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: SmartSuiteBackend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      HOST: 0.0.0.0
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      MYSQL_HOST: smartsuite-database
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-smartsuite}
      MYSQL_USER: ${MYSQL_USER:-smartsuite}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-smartsuite_password}
      MYSQL_CONNECTION_LIMIT: ${MYSQL_CONNECTION_LIMIT:-10}
      RATE_LIMIT_MAX: 60
      RATE_LIMIT_WINDOW: 1 minute
    depends_on:
      SmartSuiteDatabase:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      SmartSuiteNetwork:
        aliases:
          - smartsuite-backend

  SmartSuiteFrontend:
    image: smartsuite/frontend:latest
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: SmartSuiteFrontend
    restart: unless-stopped
    depends_on:
      SmartSuiteBackend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    networks:
      SmartSuiteNetwork:
        aliases:
          - smartsuite-frontend

volumes:
  mysql-data:
    name: SmartSuiteDatabaseData

networks:
  SmartSuiteNetwork:
    name: SmartSuiteNetwork
